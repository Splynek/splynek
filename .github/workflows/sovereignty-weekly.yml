name: Sovereignty catalog — weekly health check

# Runs every Monday at 09:00 UTC, plus on-demand via the Actions tab.
# Two jobs:
#   1. lint     — offline validator (fast, always green if catalog is well-formed)
#   2. urls     — online URL liveness; opens an issue if links rotted
# Both jobs read-only on the catalog.  Mutations are author-driven via PRs.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'Scripts/sovereignty-catalog.json'
      - 'Sources/SplynekCore/SovereigntyCatalog+Entries.swift'
      - 'Sources/SplynekCore/SovereigntyCatalog.swift'
      - 'Tests/SplynekTests/SovereigntyCatalogTests.swift'

# v1.5.6: GITHUB_TOKEN defaults to read-only for new repos as of 2023.
# The urls job needs `issues: write` to file the weekly URL-rot tracking
# issue (Octokit returned 403 "Resource not accessible by integration"
# in the 2026-04-27 run without this).  Granting at workflow level so
# both jobs share the same minimum-required scope.
permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate catalog (offline lint)
        run: swift Scripts/validate-catalog.swift --strict
      - name: Verify regenerator round-trips cleanly
        run: |
          swift Scripts/regenerate-sovereignty-catalog.swift
          if ! git diff --exit-code Sources/SplynekCore/SovereigntyCatalog+Entries.swift; then
            echo "::error::Generated SovereigntyCatalog+Entries.swift is out of sync with the JSON source."
            echo "Run 'swift Scripts/regenerate-sovereignty-catalog.swift' locally and commit the diff."
            exit 1
          fi
      # v1.5.6: `swift run splynek-test` was OOM-killed (signal 9) on
      # macos-latest (7 GB RAM) during emit-module of the 17k-line
      # generated SovereigntyCatalog+Entries.swift.  The whole-package
      # build is overkill for catalog health anyway — the validator +
      # regenerator-round-trip above already cover catalog invariants.
      # General test-suite coverage will move to a dedicated test.yml
      # workflow with -j 1 + reduced parallelism (separate follow-up).

  urls:
    runs-on: macos-latest
    # Skip this on PRs — it's slow + flaky on shared runners.  Only the
    # weekly cron and manual dispatch should hit the network.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check URL liveness
        id: check
        continue-on-error: true
        run: |
          swift Scripts/check-urls.swift --json --concurrency 30 --timeout 20 \
            > url-check.json
          jq -r '"total=\(.total) ok=\(.ok) rotted=\(.rottedCount) transient=\(.transientCount)"' url-check.json
          echo "rotted=$(jq -r '.rottedCount' url-check.json)" >> $GITHUB_OUTPUT
          echo "transient=$(jq -r '.transientCount' url-check.json)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: url-check-${{ github.run_number }}
          path: url-check.json
      # v1.5.6: only opens / updates an issue when there's TRUE rot.
      # Transient noise (429 rate-limits, 403 CDN blocks, 5xx, intermittent
      # network errors) flows into the JSON artifact but doesn't page.
      - name: Open / update tracking issue if URLs rotted
        if: steps.check.outputs.rotted != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('url-check.json', 'utf8'));
            const title = `Sovereignty catalog: ${report.rottedCount} URL(s) rotted`;
            const rotLines = report.rotted.map(r =>
              `- [${r.status}] **${r.entry}** (${r.kind}) — \`${r.alt}\`\n  ${r.url}`);
            const transientPreview = report.transient.slice(0, 10).map(r =>
              `- [${r.status}] **${r.entry}** (${r.kind}) — \`${r.alt}\``);
            const body = `Weekly URL health check.\n\n` +
              `**Total:** ${report.total} · **OK:** ${report.ok} · ` +
              `**Rotted:** ${report.rottedCount} · **Transient:** ${report.transientCount}\n\n` +
              `## Rotted (likely real, action needed)\n\n` +
              `${rotLines.join('\n')}\n\n` +
              (report.transient.length > 0
                ? `## Transient (rate-limit / CDN block / network blip — auto-recheck next run)\n\n` +
                  `Showing first ${Math.min(10, report.transient.length)} of ${report.transient.length}:\n\n` +
                  `${transientPreview.join('\n')}\n\n` +
                  `Full list in the workflow artifact.\n\n`
                : ``) +
              `Generated by \`.github/workflows/sovereignty-weekly.yml\` on ${new Date().toISOString()}.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'sovereignty-url-rot', state: 'open',
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number,
                title, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['sovereignty-url-rot'],
              });
            }
