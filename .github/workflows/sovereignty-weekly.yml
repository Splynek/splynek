name: Sovereignty catalog — weekly health check

# Runs every Monday at 09:00 UTC, plus on-demand via the Actions tab.
# Two jobs:
#   1. lint     — offline validator (fast, always green if catalog is well-formed)
#   2. urls     — online URL liveness; opens an issue if links rotted
# Both jobs read-only on the catalog.  Mutations are author-driven via PRs.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'Scripts/sovereignty-catalog.json'
      - 'Sources/SplynekCore/SovereigntyCatalog+Entries.swift'
      - 'Sources/SplynekCore/SovereigntyCatalog.swift'
      - 'Tests/SplynekTests/SovereigntyCatalogTests.swift'

# v1.5.6: GITHUB_TOKEN defaults to read-only for new repos as of 2023.
# The urls job needs `issues: write` to file the weekly URL-rot tracking
# issue (Octokit returned 403 "Resource not accessible by integration"
# in the 2026-04-27 run without this).  Granting at workflow level so
# both jobs share the same minimum-required scope.
#
# v1.5.7: the new auto-prune job needs `contents: write` + `pull-requests:
# write` to commit the pruned-catalog diff and open a PR.  PR review is
# still required before merge — the workflow doesn't auto-merge.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate catalog (offline lint)
        run: swift Scripts/validate-catalog.swift --strict
      - name: Verify regenerator round-trips cleanly
        run: |
          swift Scripts/regenerate-sovereignty-catalog.swift
          if ! git diff --exit-code Sources/SplynekCore/SovereigntyCatalog+Entries.swift; then
            echo "::error::Generated SovereigntyCatalog+Entries.swift is out of sync with the JSON source."
            echo "Run 'swift Scripts/regenerate-sovereignty-catalog.swift' locally and commit the diff."
            exit 1
          fi
      # v1.5.6: `swift run splynek-test` was OOM-killed (signal 9) on
      # macos-latest (7 GB RAM) during emit-module of the 17k-line
      # generated SovereigntyCatalog+Entries.swift.  The whole-package
      # build is overkill for catalog health anyway — the validator +
      # regenerator-round-trip above already cover catalog invariants.
      # General test-suite coverage will move to a dedicated test.yml
      # workflow with -j 1 + reduced parallelism (separate follow-up).

  urls:
    runs-on: macos-latest
    # Skip this on PRs — it's slow + flaky on shared runners.  Only the
    # weekly cron and manual dispatch should hit the network.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check URL liveness
        id: check
        continue-on-error: true
        run: |
          swift Scripts/check-urls.swift --json --concurrency 30 --timeout 20 \
            > url-check.json
          jq -r '"total=\(.total) ok=\(.ok) rotted=\(.rottedCount) transient=\(.transientCount)"' url-check.json
          echo "rotted=$(jq -r '.rottedCount' url-check.json)" >> $GITHUB_OUTPUT
          echo "transient=$(jq -r '.transientCount' url-check.json)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: url-check-${{ github.run_number }}
          path: url-check.json
      # v1.5.6: only opens / updates an issue when there's TRUE rot.
      # Transient noise (429 rate-limits, 403 CDN blocks, 5xx, intermittent
      # network errors) flows into the JSON artifact but doesn't page.
      - name: Open / update tracking issue if URLs rotted
        if: steps.check.outputs.rotted != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('url-check.json', 'utf8'));
            const title = `Sovereignty catalog: ${report.rottedCount} URL(s) rotted`;
            const rotLines = report.rotted.map(r =>
              `- [${r.status}] **${r.entry}** (${r.kind}) — \`${r.alt}\`\n  ${r.url}`);
            const transientPreview = report.transient.slice(0, 10).map(r =>
              `- [${r.status}] **${r.entry}** (${r.kind}) — \`${r.alt}\``);
            const body = `Weekly URL health check.\n\n` +
              `**Total:** ${report.total} · **OK:** ${report.ok} · ` +
              `**Rotted:** ${report.rottedCount} · **Transient:** ${report.transientCount}\n\n` +
              `## Rotted (likely real, action needed)\n\n` +
              `${rotLines.join('\n')}\n\n` +
              (report.transient.length > 0
                ? `## Transient (rate-limit / CDN block / network blip — auto-recheck next run)\n\n` +
                  `Showing first ${Math.min(10, report.transient.length)} of ${report.transient.length}:\n\n` +
                  `${transientPreview.join('\n')}\n\n` +
                  `Full list in the workflow artifact.\n\n`
                : ``) +
              `Generated by \`.github/workflows/sovereignty-weekly.yml\` on ${new Date().toISOString()}.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'sovereignty-url-rot', state: 'open',
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number,
                title, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['sovereignty-url-rot'],
              });
            }

  # v1.5.7: auto-prune broken downloadURLs.
  #
  # Runs after the URL-liveness check.  Verifies every downloadURL in the
  # catalog (with full Content-Type validation — a 200 OK that returns
  # text/html is treated as broken because it's a landing page, not a
  # binary installer).  When broken downloadURLs are found, the catalog
  # is rewritten in place with those URLs removed (the alternative entry
  # stays — only its `downloadURL` field is dropped, falling back to
  # homepage-only).  The diff is opened as a PR for human review.
  #
  # Only weekly cron + manual dispatch trigger this — never on PRs (that
  # would create cycles).  Transient failures (429 / 5xx / DNS blips) are
  # NEVER pruned, only true rot.
  prune-broken-downloads:
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    needs: urls
    steps:
      - uses: actions/checkout@v4
      - name: Verify + auto-prune broken downloadURLs
        id: prune
        run: |
          swift Scripts/check-urls.swift \
            --prune-broken-downloads --json \
            --concurrency 30 --timeout 20 \
            > prune-report.json
          jq -r '"rotted=\(.rottedCount) pruned=\(.prunedCount)"' prune-report.json
          echo "pruned=$(jq -r '.prunedCount' prune-report.json)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: prune-report-${{ github.run_number }}
          path: prune-report.json
      - name: Re-validate catalog after prune (must still lint clean)
        if: steps.prune.outputs.pruned != '0'
        run: swift Scripts/validate-catalog.swift --strict
      - name: Regenerate Swift catalog after prune
        if: steps.prune.outputs.pruned != '0'
        run: swift Scripts/regenerate-sovereignty-catalog.swift
      - name: Open PR with auto-prune diff
        if: steps.prune.outputs.pruned != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sovereignty-prune-${{ github.run_number }}
          base: main
          delete-branch: true
          commit-message: |
            sovereignty: auto-prune broken downloadURLs

            Removed downloadURLs that failed verification (true rot only —
            transient 429 / 5xx / DNS failures are not pruned).

            Includes Content-Type validation: a 200 OK that returns
            text/html on a downloadURL counts as broken because it's a
            landing page, not a binary installer.

            Run: ${{ github.run_id }}
          title: "sovereignty: auto-prune broken downloadURLs (run #${{ github.run_number }})"
          body: |
            Automated prune from `.github/workflows/sovereignty-weekly.yml`.

            **Pruned:** ${{ steps.prune.outputs.pruned }} broken downloadURL(s).

            ### What this PR does
            - Removed `downloadURL` fields whose target failed verification.
              Alternative entries are kept; they fall back to homepage-only.
            - Re-ran the offline catalog validator (`--strict`) — passes.
            - Regenerated `SovereigntyCatalog+Entries.swift`.

            ### Why each URL was flagged
            See attached `prune-report.json` artifact for the full report,
            including the Content-Type each broken URL returned.

            Common failure modes:
            - **`200 html(...)`** — landing page, not a binary installer
              (e.g. GitHub `releases/latest/download/Foo.dmg` 404'd into
              the org's HTML 404 page).
            - **`404` / `403`** — URL no longer exists or CDN bot-block
              that survived the HEAD→GET retry.
            - **`unparseable`** — server returned non-HTTP response.

            Transient failures (429 rate-limits, 5xx, DNS blips) are
            **never** pruned by this workflow — they're tracked separately
            in the URL-rot issue.
          labels: |
            sovereignty-auto-prune
            automated
