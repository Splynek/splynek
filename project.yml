# XcodeGen spec for Splynek's Mac App Store build.
#
# The free-tier DMG is still produced by `./Scripts/build.sh` (pure
# SPM flow, no Xcode needed — the community can build from source
# on Command Line Tools alone). This Xcode project exists to produce
# the MAS variant: sandboxed, IAP-enabled, signed with Apple
# Distribution, submitted via Transporter / App Store Connect.
#
# Architecture note: both Xcode targets COMPILE SOURCES DIRECTLY
# rather than linking the Swift Package. This avoids the public-
# access-modifier surgery that a cross-module dependency would
# require, and lets the MAS target simply exclude stub files and
# include splynek-pro's files — everything ends up in one app
# module with internal visibility across the boundary.
#
# The SPM Package.swift is kept intact for Scripts/build.sh only.
# Tests (`swift run splynek-test`) also run against SPM.
#
# Regenerate:
#   xcodegen generate
# Build:
#   xcodebuild -project Splynek.xcodeproj -scheme Splynek build
# Archive (MAS):
#   xcodebuild -project Splynek.xcodeproj -scheme Splynek-MAS archive
name: Splynek
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: app.splynek
  developmentLanguage: en
  xcodeVersion: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  Release-MAS: release

settings:
  base:
    DEVELOPMENT_TEAM: 58C6YC5GB5
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    # ⚠️  v1.0 (App Store) IS IN APPLE REVIEW.  Do NOT `xcodebuild
    # archive -scheme Splynek-MAS` and submit while review is in
    # flight — that replaces the in-queue v1.0 binary with whatever
    # version this file currently declares.  Wait for "Pronto para
    # venda" (Ready for Sale) before MAS resubmissions.  The DMG /
    # Developer-ID stream (`./Scripts/build.sh`) is independent and
    # safe to re-cut at any time.
    MARKETING_VERSION: "1.6.2"
    CURRENT_PROJECT_VERSION: "1620"
    ENABLE_HARDENED_RUNTIME: "YES"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: app.splynek.Splynek
    ASSETCATALOG_COMPILER_APPICON_NAME: ""
    # Swift package dependency resolution happens per-target via
    # `packages:` above; we don't use package products here, but
    # Xcode still scans the Package.swift at the project root.

targets:

  # ===================================================================
  # Splynek (DMG in Xcode)
  # Direct source compilation. No sandbox, no IAP. Use for notarised
  # Developer-ID builds via `xcodebuild archive`.
  # ===================================================================
  Splynek:
    type: application
    platform: macOS
    sources:
      - path: Sources/Splynek
      - path: Sources/SplynekCore
      - path: Resources/Splynek.icns
        buildPhase: resources
      - path: Resources/Legal
        type: folder
        buildPhase: resources
      - path: Extensions
        type: folder
        buildPhase: resources
        optional: true
    info:
      path: Resources/Generated-Info.plist
      properties:
        CFBundleName: Splynek
        CFBundleDisplayName: Splynek
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: Splynek
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        # v1.6.1 localization — same array as Resources/Info.plist
        # (DMG/SPM build).  Apple uses this for the App Store
        # listing's "Languages" section.
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, pt-PT, es, fr, de, it]
        CFBundleURLTypes:
          - CFBundleURLName: app.splynek.Splynek.download
            CFBundleURLSchemes: [splynek]
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: BitTorrent metainfo
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.bittorrent.torrent]
            CFBundleTypeExtensions: [torrent]
          - CFBundleTypeName: Metalink
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions: [metalink, meta4]
    settings:
      base:
        PRODUCT_NAME: Splynek
        # No CODE_SIGN_IDENTITY override — with automatic signing,
        # Xcode picks "Apple Development" for build and
        # "Developer ID Application" for archive (requires that cert
        # to exist in the keychain). Manual override conflicts with
        # automatic signing style.

  # ===================================================================
  # Splynek-MAS — App Store build.
  # Sandboxed, IAP-capable, Apple-Distribution-signed.
  # Excludes the stub files (ProStubs.swift + 3 stub view files) and
  # includes splynek-pro's real implementations in their place.
  # Expects splynek-pro checked out as a sibling directory:
  #   /Users/pcgm/Claude Code/
  #   /Users/pcgm/splynek-pro/
  # ===================================================================
  Splynek-MAS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Splynek
      # SplynekCore sources, minus the stub files that SplynekPro
      # replaces. XcodeGen's `excludes` maps directly to Xcode's
      # per-file membership in the target.
      - path: Sources/SplynekCore
        excludes:
          - ProStubs.swift
          - Views/ConciergeView.swift
          - Views/RecipeView.swift
          - Views/ProLockedView.swift
      # splynek-pro's real Pro modules, pulled in from the sibling
      # private repo. Same module as the rest of the app target.
      - path: ../splynek-pro/Sources/SplynekPro
      - path: Resources/Splynek.icns
        buildPhase: resources
      - path: Resources/Legal
        type: folder
        buildPhase: resources
      - path: Extensions
        type: folder
        buildPhase: resources
        optional: true
    info:
      path: Resources/Generated-Info-MAS.plist
      properties:
        CFBundleName: Splynek
        CFBundleDisplayName: Splynek
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: Splynek
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: app.splynek.Splynek.download
            CFBundleURLSchemes: [splynek]
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: BitTorrent metainfo
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.bittorrent.torrent]
            CFBundleTypeExtensions: [torrent]
          - CFBundleTypeName: Metalink
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions: [metalink, meta4]
        # Export compliance: HMAC + TLS are both exempt under
        # BIS 740.17(b)(3)(i). Declare once to skip the per-release
        # export-compliance question in App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        # v1.8.2: SMJobBless privileged-helper bundle declaration.
        # Lists every helper this app may install via
        # SMAppService.daemon.register() / SMJobBless().  The
        # requirement string must match the helper's code-signing
        # identity.  At MAS submission time the maintainer fills in
        # the real Apple Distribution leaf SubjectKeyIdentifier; for
        # development we anchor to the Apple Developer Team ID.
        SMPrivilegedExecutables:
          app.splynek.Splynek.helper: anchor apple generic and identifier "app.splynek.Splynek.helper" and certificate leaf[subject.OU] = "58C6YC5GB5"
    settings:
      base:
        PRODUCT_NAME: Splynek
        CODE_SIGN_ENTITLEMENTS: Resources/Splynek-MAS.entitlements
        # CODE_SIGN_IDENTITY is NOT set — automatic signing picks
        # "Apple Distribution" for archive actions, "Apple
        # Development" for regular builds. Manual override here
        # breaks automatic provisioning.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD
        # StoreKit local-test config. Simulates the $29 IAP without
        # submitting to App Store Connect. Drop to test against the
        # real App-Store sandbox instead — set the product ID in ASC
        # → In-App Purchases first.
        STOREKIT_CONFIGURATION_FILE_PATH: Resources/Splynek.storekit
    # v1.8.2: ensure the privileged helper bundle ships inside this
    # app's Contents/Library/LaunchServices/ + Library/LaunchDaemons/
    # so SMAppService.daemon.register() resolves it.
    dependencies:
      - target: SplynekHelper
        copy: true
        codeSign: true
        embed: true

  # v1.8.2: privileged installer helper.  Runs as a launchd daemon
  # at root after first SMAppService.daemon.register() prompt.  See
  # docs/SMJOB-BLESS-DESIGN.md for the architecture overview;
  # Sources/SplynekHelper/ for the implementation.
  SplynekHelper:
    type: tool
    platform: macOS
    sources:
      - path: Sources/SplynekHelper
      # The protocol declaration is shared with the app target so
      # both compile against the same @objc shape.  We pull it in
      # via direct path rather than a package dependency because
      # SwiftPM doesn't expose helper-bundle targets.
      - path: Sources/SplynekCore/SplynekHelperProtocol.swift
    info:
      path: Sources/SplynekHelper/Info.plist
      # v1.7.x perfection pass: declare the FULL Info.plist content
      # in project.yml so `xcodegen generate` writes a complete
      # plist instead of its default placeholder template.
      # Without this, every `./Scripts/build.sh debug` run drifts
      # the source-controlled Info.plist back to xcodegen's defaults
      # (stripping the SMAuthorizedClients requirement + comments).
      properties:
        CFBundleIdentifier: app.splynek.Splynek.helper
        CFBundleName: SplynekHelper
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleExecutable: SplynekHelper
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        NSHumanReadableCopyright: "© 2026 Splynek"
        # v1.8.2: SMAuthorizedClients tells launchd which app
        # signing identities are allowed to talk to this helper.
        # The string is a Code Signing Requirement Language
        # expression.  At MAS submission time the maintainer fills
        # in the actual Apple Distribution leaf certificate's
        # SubjectKeyIdentifier; for development this anchors to
        # the Apple Developer Team ID 58C6YC5GB5.
        SMAuthorizedClients:
          - 'anchor apple generic and identifier "app.splynek.Splynek" and certificate leaf[subject.OU] = "58C6YC5GB5"'
    settings:
      base:
        PRODUCT_NAME: SplynekHelper
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.Splynek.helper
        CODE_SIGN_ENTITLEMENTS: Sources/SplynekHelper/SplynekHelper.entitlements
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/PrivilegedHelperTools
        SKIP_INSTALL: NO
        # The launchd plist must be embedded inside the helper
        # binary's __TEXT segment so SMAppService can find it.
        OTHER_LDFLAGS: >-
          -sectcreate __TEXT __info_plist Sources/SplynekHelper/Info.plist
          -sectcreate __TEXT __launchd_plist
          Sources/SplynekHelper/app.splynek.Splynek.helper.plist

schemes:
  Splynek:
    build:
      targets:
        Splynek: all
    run:
      config: Debug
    archive:
      config: Release
  Splynek-MAS:
    build:
      targets:
        Splynek-MAS: all
    run:
      config: Debug
    archive:
      config: Release-MAS
