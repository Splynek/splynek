# XcodeGen spec for Splynek's Mac App Store build.
#
# The free-tier DMG is still produced by `./Scripts/build.sh` (pure
# SPM flow, no Xcode needed — the community can build from source
# on Command Line Tools alone). This Xcode project exists to produce
# the MAS variant: sandboxed, IAP-enabled, signed with Apple
# Distribution, submitted via Transporter / App Store Connect.
#
# Architecture note: both Xcode targets COMPILE SOURCES DIRECTLY
# rather than linking the Swift Package. This avoids the public-
# access-modifier surgery that a cross-module dependency would
# require, and lets the MAS target simply exclude stub files and
# include splynek-pro's files — everything ends up in one app
# module with internal visibility across the boundary.
#
# The SPM Package.swift is kept intact for Scripts/build.sh only.
# Tests (`swift run splynek-test`) also run against SPM.
#
# Regenerate:
#   xcodegen generate
# Build:
#   xcodebuild -project Splynek.xcodeproj -scheme Splynek build
# Archive (MAS):
#   xcodebuild -project Splynek.xcodeproj -scheme Splynek-MAS archive
name: Splynek
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: app.splynek
  developmentLanguage: en
  xcodeVersion: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  Release-MAS: release

settings:
  base:
    DEVELOPMENT_TEAM: 58C6YC5GB5
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    # ⚠️  v1.0 (App Store) IS IN APPLE REVIEW.  Do NOT `xcodebuild
    # archive -scheme Splynek-MAS` and submit while review is in
    # flight — that replaces the in-queue v1.0 binary with whatever
    # version this file currently declares.  Wait for "Pronto para
    # venda" (Ready for Sale) before MAS resubmissions.  The DMG /
    # Developer-ID stream (`./Scripts/build.sh`) is independent and
    # safe to re-cut at any time.
    MARKETING_VERSION: "3.0.0"
    CURRENT_PROJECT_VERSION: "3000"
    ENABLE_HARDENED_RUNTIME: "YES"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: app.splynek.Splynek
    ASSETCATALOG_COMPILER_APPICON_NAME: ""
    # Swift package dependency resolution happens per-target via
    # `packages:` above; we don't use package products here, but
    # Xcode still scans the Package.swift at the project root.

targets:

  # ===================================================================
  # Splynek (DMG in Xcode)
  # Direct source compilation. No sandbox, no IAP. Use for notarised
  # Developer-ID builds via `xcodebuild archive`.
  # ===================================================================
  Splynek:
    type: application
    platform: macOS
    sources:
      - path: Sources/Splynek
      - path: Sources/SplynekCore
      # S4 phase 3 / Sprint 1 PRO-PLUS-IPHONE: SplynekCore depends on
      # types that live in iOS/Shared/ for the iOS Companion app.
      # Xcode compiles these files into the macOS Splynek target
      # directly; SPM uses `import SplynekCompanionCore` gated on
      # `SWIFT_PACKAGE`.
      - path: iOS/Shared/CloudKitRelayRecord.swift
      - path: iOS/Shared/RelaySummaryTypes.swift
      - path: iOS/Shared/TrustWatchAlertRecord.swift
      - path: Resources/Splynek.icns
        buildPhase: resources
      - path: Resources/Legal
        type: folder
        buildPhase: resources
      - path: Extensions
        type: folder
        buildPhase: resources
        optional: true
      # 2026-05-08: 4088-entry Homebrew Cask metadata JSON, used by
      # SovereigntyCatalog+CaskHints.swift's runtime loader to enrich
      # the contribute flow.  SwiftPM picks this up via Package.swift
      # resources block; for Xcode (this section) we declare it as an
      # explicit resource so MAS builds bundle it too.
      - path: Sources/SplynekCore/Resources/cask-hints.json
        buildPhase: resources
    info:
      path: Resources/Generated-Info.plist
      properties:
        CFBundleName: Splynek
        CFBundleDisplayName: Splynek
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: Splynek
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        # v1.6.1 localization — same array as Resources/Info.plist
        # (DMG/SPM build).  Apple uses this for the App Store
        # listing's "Languages" section.
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations: [en, pt-PT, es, fr, de, it]
        CFBundleURLTypes:
          - CFBundleURLName: app.splynek.Splynek.download
            CFBundleURLSchemes: [splynek]
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: BitTorrent metainfo
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.bittorrent.torrent]
            CFBundleTypeExtensions: [torrent]
          - CFBundleTypeName: Metalink
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions: [metalink, meta4]
    settings:
      base:
        PRODUCT_NAME: Splynek
        # No CODE_SIGN_IDENTITY override — with automatic signing,
        # Xcode picks "Apple Development" for build and
        # "Developer ID Application" for archive (requires that cert
        # to exist in the keychain). Manual override conflicts with
        # automatic signing style.

  # ===================================================================
  # Splynek-MAS — App Store build.
  # Sandboxed, IAP-capable, Apple-Distribution-signed.
  # Excludes the stub files (ProStubs.swift + 3 stub view files) and
  # includes splynek-pro's real implementations in their place.
  # Expects splynek-pro checked out as a sibling directory:
  #   /Users/pcgm/Claude Code/
  #   /Users/pcgm/splynek-pro/
  # ===================================================================
  Splynek-MAS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Splynek
      # SplynekCore sources, minus the stub files that SplynekPro
      # replaces. XcodeGen's `excludes` maps directly to Xcode's
      # per-file membership in the target.
      - path: Sources/SplynekCore
        excludes:
          - ProStubs.swift
          - Views/ConciergeView.swift
          - Views/RecipeView.swift
          - Views/ProLockedView.swift
      # S4 phase 3 / Sprint 1 PRO-PLUS-IPHONE: shared types from
      # iOS/Shared (see Splynek macOS target for the rationale).
      - path: iOS/Shared/CloudKitRelayRecord.swift
      - path: iOS/Shared/RelaySummaryTypes.swift
      - path: iOS/Shared/TrustWatchAlertRecord.swift
      # splynek-pro's real Pro modules, pulled in from the sibling
      # private repo. Same module as the rest of the app target.
      - path: ../splynek-pro/Sources/SplynekPro
      - path: Resources/Splynek.icns
        buildPhase: resources
      - path: Resources/Legal
        type: folder
        buildPhase: resources
      - path: Extensions
        type: folder
        buildPhase: resources
        optional: true
      # 2026-05-08: cask-hints JSON resource (mirrored from Splynek
      # macOS target so MAS bundles it too).
      - path: Sources/SplynekCore/Resources/cask-hints.json
        buildPhase: resources
    info:
      path: Resources/Generated-Info-MAS.plist
      properties:
        CFBundleName: Splynek
        CFBundleDisplayName: Splynek
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconFile: Splynek
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: app.splynek.Splynek.download
            CFBundleURLSchemes: [splynek]
            LSHandlerRank: Owner
        CFBundleDocumentTypes:
          - CFBundleTypeName: BitTorrent metainfo
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.bittorrent.torrent]
            CFBundleTypeExtensions: [torrent]
          - CFBundleTypeName: Metalink
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions: [metalink, meta4]
        # Export compliance: HMAC + TLS are both exempt under
        # BIS 740.17(b)(3)(i). Declare once to skip the per-release
        # export-compliance question in App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        # v1.8.2: SMJobBless privileged-helper bundle declaration.
        # Lists every helper this app may install via
        # SMAppService.daemon.register() / SMJobBless().  The
        # requirement string must match the helper's code-signing
        # identity.  At MAS submission time the maintainer fills in
        # the real Apple Distribution leaf SubjectKeyIdentifier; for
        # development we anchor to the Apple Developer Team ID.
        SMPrivilegedExecutables:
          app.splynek.Splynek.helper: anchor apple generic and identifier "app.splynek.Splynek.helper" and certificate leaf[subject.OU] = "58C6YC5GB5"
    settings:
      base:
        PRODUCT_NAME: Splynek
        CODE_SIGN_ENTITLEMENTS: Resources/Splynek-MAS.entitlements
        # CODE_SIGN_IDENTITY is NOT set — automatic signing picks
        # "Apple Distribution" for archive actions, "Apple
        # Development" for regular builds. Manual override here
        # breaks automatic provisioning.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD
        # StoreKit local-test config. Simulates the $29 IAP without
        # submitting to App Store Connect. Drop to test against the
        # real App-Store sandbox instead — set the product ID in ASC
        # → In-App Purchases first.
        STOREKIT_CONFIGURATION_FILE_PATH: Resources/Splynek.storekit
    # v1.8.2: ensure the privileged helper bundle ships inside this
    # app's Contents/Library/LaunchServices/ + Library/LaunchDaemons/
    # so SMAppService.daemon.register() resolves it.
    dependencies:
      - target: SplynekHelper
        copy: true
        codeSign: true
        embed: true
      # 2026-05-05 (Strategy Bet S5): Safari WebExtension bundled into
      # the host app.  When the user installs Splynek, Safari's
      # Settings → Extensions automatically lists "Splynek" — they
      # tick it once to enable.  Same UX as the Chrome extension's
      # Load Unpacked, but ships pre-built.
      - target: Splynek-Safari-Extension
        copy: true
        codeSign: true
        embed: true

  # v1.8.2: privileged installer helper.  Runs as a launchd daemon
  # at root after first SMAppService.daemon.register() prompt.  See
  # docs/SMJOB-BLESS-DESIGN.md for the architecture overview;
  # Sources/SplynekHelper/ for the implementation.
  SplynekHelper:
    type: tool
    platform: macOS
    sources:
      - path: Sources/SplynekHelper
      # The protocol declaration is shared with the app target so
      # both compile against the same @objc shape.  We pull it in
      # via direct path rather than a package dependency because
      # SwiftPM doesn't expose helper-bundle targets.
      - path: Sources/SplynekCore/SplynekHelperProtocol.swift
    info:
      path: Sources/SplynekHelper/Info.plist
      # v1.7.x perfection pass: declare the FULL Info.plist content
      # in project.yml so `xcodegen generate` writes a complete
      # plist instead of its default placeholder template.
      # Without this, every `./Scripts/build.sh debug` run drifts
      # the source-controlled Info.plist back to xcodegen's defaults
      # (stripping the SMAuthorizedClients requirement + comments).
      properties:
        CFBundleIdentifier: app.splynek.Splynek.helper
        CFBundleName: SplynekHelper
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleExecutable: SplynekHelper
        CFBundlePackageType: APPL
        CFBundleSignature: "????"
        NSHumanReadableCopyright: "© 2026 Splynek"
        # v1.8.2: SMAuthorizedClients tells launchd which app
        # signing identities are allowed to talk to this helper.
        # The string is a Code Signing Requirement Language
        # expression.  At MAS submission time the maintainer fills
        # in the actual Apple Distribution leaf certificate's
        # SubjectKeyIdentifier; for development this anchors to
        # the Apple Developer Team ID 58C6YC5GB5.
        SMAuthorizedClients:
          - 'anchor apple generic and identifier "app.splynek.Splynek" and certificate leaf[subject.OU] = "58C6YC5GB5"'
    settings:
      base:
        PRODUCT_NAME: SplynekHelper
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.Splynek.helper
        CODE_SIGN_ENTITLEMENTS: Sources/SplynekHelper/SplynekHelper.entitlements
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/PrivilegedHelperTools
        SKIP_INSTALL: NO
        # The launchd plist must be embedded inside the helper
        # binary's __TEXT segment so SMAppService can find it.
        OTHER_LDFLAGS: >-
          -sectcreate __TEXT __info_plist Sources/SplynekHelper/Info.plist
          -sectcreate __TEXT __launchd_plist
          Sources/SplynekHelper/app.splynek.Splynek.helper.plist

  # Strategy Bet S5: Safari WebExtension as appex.  The web-extension
  # JS / HTML / CSS / icons live in Extensions/Safari-WebExtension/
  # Resources/ and ship verbatim inside the appex bundle's Resources/.
  # The Swift handler is a minimal NSExtensionRequestHandling stub —
  # all extension logic is JavaScript today.
  Splynek-Safari-Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/Safari-WebExtension/SafariWebExtensionHandler.swift
      # The Resources/ folder's CONTENTS get copied into the appex
      # bundle's `Contents/Resources/` (not the folder itself).  Use
      # `buildPhase: resources` so xcodegen iterates the children
      # rather than shipping the folder as one opaque blob (which
      # double-nests as Contents/Resources/Resources/...).  Manifest
      # paths like `popup.html`, `icons/icon-128.png` then resolve
      # correctly against Apple's Safari WebExtension convention.
      - path: Extensions/Safari-WebExtension/Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
    info:
      path: Extensions/Safari-WebExtension/Info.plist
      # NSExtension keys identify this as a Safari WebExtension.
      # SFSafariWebExtensionConverterVersion ties to Apple's
      # `safari-web-extension-converter` tool's output schema; "16"
      # is the macOS Sequoia / Safari 18 schema (current as of
      # 2026-05-05).  When Apple bumps the schema, this number
      # bumps too — Apple keeps it backwards-compatible.
      properties:
        CFBundleDisplayName: Splynek Safari Extension
        CFBundleIdentifier: app.splynek.Splynek.SafariExtension
        NSHumanReadableCopyright: "© 2026 Splynek"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
          SFSafariWebExtensionManifestPath: Resources/manifest.json
        SFSafariWebExtensionConverterVersion: "16"
    settings:
      base:
        PRODUCT_NAME: SplynekSafariExtension
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.Splynek.SafariExtension
        CODE_SIGN_ENTITLEMENTS: Extensions/Safari-WebExtension/Splynek-Safari.entitlements
        SKIP_INSTALL: NO
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"

  # ==========================================================
  # Strategy Bet S4 — iOS Companion (foundation, 2026-05-07)
  # ==========================================================
  #
  # Two new targets paired together, both iOS:
  #
  #   • SplynekCompanion         — the iPhone app (free on App Store)
  #   • SplynekShareExtension    — the "Send to Splynek" Share Extension
  #
  # Architecture mirrors the macOS Safari WebExtension setup: app +
  # extension, shared App Group, separate Info.plists, shared sources
  # under iOS/Shared/ are compiled into BOTH targets so the Share
  # Extension carries its own copy of PairedMacStore + PairedMacClient
  # + ShareExtractor + Bonjour browser without a framework dependency.
  #
  # Build:
  #   xcodebuild -project Splynek.xcodeproj -scheme SplynekCompanion \
  #     -destination 'generic/platform=iOS' archive
  #
  # The companion ships independently from the macOS app — it talks to
  # Splynek-Mac purely over the LAN REST API that already exists, so
  # there's no Mac-side code change required for the iOS app to work.

  SplynekCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/SplynekCompanion
        excludes:
          - "Info.plist"
      - path: iOS/Shared
      # S4 polish (2026-05-07): localization scaffolding.  iOS-side
      # `Localizable.xcstrings` mirrors the macOS pattern from
      # `Sources/SplynekCore/Localizable.xcstrings`.  SwiftUI's
      # `Text("…")` initializer takes a `LocalizedStringKey`
      # implicitly when called with a string literal, so the existing
      # iOS code already binds to the catalog without any code
      # changes.  5 locales: en (source) + de + es + fr + it + pt-PT.
    resources:
      - path: iOS/SplynekCompanion/Localizable.xcstrings
      # 2026-05-07 follow-up: iOS app icon.  Sourced from the macOS
      # Splynek.icns 1024×1024 slice for visual consistency between
      # Mac + iPhone.  Single iOS 17+ asset (the system rounds the
      # corners + scales to all required sizes from the 1024 source).
      - path: iOS/SplynekCompanion/Assets.xcassets
    info:
      # xcodegen GENERATES the Info.plist at this path on every run
      # from `properties:` below — never read it as a source-of-truth
      # input.  Hand-editing the plist is futile; edit project.yml
      # and re-run `xcodegen generate`.
      path: iOS/SplynekCompanion/Info.plist
      properties:
        CFBundleDisplayName: Splynek
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # CFBundleIconName tells iOS which asset-catalog entry to
        # use for the home-screen icon.  Without this, iOS shows the
        # blank/translucent placeholder we just had on the Simulator.
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Bonjour for paired-Mac discovery.  Apple requires both the
        # purpose string + the service-type allowlist for any iOS
        # app that browses LAN services.
        NSLocalNetworkUsageDescription: "Splynek finds Macs running Splynek on your Wi-Fi to send downloads to them."
        NSBonjourServices:
          - _splynek-fleet._tcp
        # ATS exception for cleartext LAN HTTP — Splynek's LAN
        # server doesn't terminate TLS (always between the iOS
        # device and a Mac on the same Wi-Fi).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Live Activity opt-in (S4 phase 2) — required for
        # ActivityKit.  SplynekCompanionWidgets provides the views.
        NSSupportsLiveActivities: true
        # QR-pairing camera (S4 phase 2) — AVFoundation scanner.
        NSCameraUsageDescription: "Splynek scans a QR code from your Mac's Settings → Sharing pane to pair instantly."
        # v2.0.1 polish (2026-05-11): register the splynek:// URL
        # scheme so a `splynek://pair?host=…&port=…&token=…` link
        # — tapped in Messages / Mail / Notes after the user hits
        # "Copy pair URL" on the Mac — auto-opens the Companion
        # and pairs.  SplynekCompanionApp.onOpenURL handles it.
        CFBundleURLTypes:
          - CFBundleURLName: app.splynek.companion.pair
            CFBundleURLSchemes: [splynek]
            LSHandlerRank: Owner
        # Sprint 2 part-2 (2026-05-09) — Geo-fence pause/resume.
        # whenInUse is enough to register the home region; always
        # is required for the boundary cross to fire while the app
        # is in the background.  We ask whenInUse first; the user
        # opts-in to always via a Settings toggle.
        NSLocationWhenInUseUsageDescription: "Splynek detects when you leave or arrive home so it can pause and resume downloads on your Mac. Coordinates never leave your device."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Splynek monitors a single home boundary in the background to pause and resume downloads on your Mac as you come and go. Only the boolean \"you crossed the boundary\" leaves the device — to your Mac, on your Wi-Fi."
    settings:
      base:
        PRODUCT_NAME: Splynek
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.companion
        CODE_SIGN_ENTITLEMENTS: iOS/Resources/SplynekCompanion.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        # Companion ships under its own marketing version track —
        # decoupled from the Mac app's MARKETING_VERSION at the workspace
        # level, but matches it here for consistency on the first cut.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: "NO"  # iOS doesn't use this entitlement
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SplynekShareExtension
        embed: true
        codeSign: true
      - target: SplynekCompanionWidgets
        embed: true
        codeSign: true

  SplynekShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/SplynekShareExtension
        excludes:
          - "Info.plist"
      - path: iOS/Shared
    info:
      path: iOS/SplynekShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Send to Splynek
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            # Activation rule — any input item carrying a URL or text
            # payload activates the extension.  Covers Safari URL
            # shares + multi-line notes with embedded URLs (NSDataDetector
            # handles the embedded case).
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
        # Same Bonjour + cleartext exceptions as the host app —
        # the Share Extension makes its own HTTP requests, so it
        # needs its own ATS dispensation.
        NSLocalNetworkUsageDescription: "Splynek sends URLs to Macs on your Wi-Fi."
        NSBonjourServices:
          - _splynek-fleet._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_NAME: SplynekShare
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.companion.ShareExtension
        CODE_SIGN_ENTITLEMENTS: iOS/Resources/SplynekShareExtension.entitlements
        SKIP_INSTALL: "YES"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic

  # Sprint 2 part-2 (2026-05-09) — watchOS Splynek Watch app.
  # Tap-to-pause/resume + Sovereignty score complication, all
  # backed by the same PairedMacClient + RelaySummary endpoints
  # the iPhone Companion uses.
  #
  # Pairing model: the Watch app reads PairedMac records from
  # the same App Group plist the iPhone writes to.  No separate
  # pairing flow — a Mac paired on the iPhone is automatically
  # available on the watch.  Future commits add a watch-specific
  # toggle to pick which Mac the watch acts on when multiple are
  # available.
  #
  # Status (this commit): app target wired, basic SwiftUI body
  # with two buttons + a status label.  Complication, deeper
  # connectivity (WatchConnectivity for fast Mac picks), and
  # background refresh deferred to a follow-up commit.
  SplynekWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: iOS/SplynekWatch
      # Pull the iOS/Shared sources (PairedMac, PairedMacStore,
      # PairedMacClient, RelaySummary) so the Watch can act on
      # the user's paired Mac directly.  Same inlining pattern
      # the Widget extension uses.
      - path: iOS/Shared
    info:
      path: iOS/SplynekWatch/Info.plist
      properties:
        CFBundleDisplayName: Splynek
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSLocalNetworkUsageDescription: "Splynek Watch sends pause/resume commands to your Mac on the same Wi-Fi."
        WKApplication: true
        # Required by watchOS 10+: a non-Watch-only app must declare
        # its iPhone companion's bundle ID so Springboard knows
        # which iOS app this Watch app belongs to.  Without this,
        # simulator install fails with MIInstallerErrorDomain code
        # 97 / InvalidCompanionAppBundleIdentifier.
        WKCompanionAppBundleIdentifier: app.splynek.companion
        # Points watchOS at the AppIcon entry in Assets.xcassets so
        # Springboard renders the Splynek logo instead of the blank
        # placeholder.  Same pattern as the iOS Companion target
        # (line 425).  Single 1024×1024 marketing icon is sufficient
        # for watchOS 10+; image lives at
        # iOS/SplynekWatch/Assets.xcassets/AppIcon.appiconset/.
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_NAME: Splynek Watch
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.companion.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"  # Watch
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        # Override the project-level ASSETCATALOG_COMPILER_APPICON_NAME=""
        # (which exists for the macOS Splynek target that ships
        # Resources/Splynek.icns instead of an asset catalog) so the
        # watchOS asset compiler binds the AppIcon set.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Sprint 3 (2026-05-10) — Watch face complications.  Same
  # WidgetKit shape as the iOS SplynekStatusWidget; subset of
  # data (Sovereignty score + active downloads) tuned for the
  # tighter Watch families (accessoryCircular, accessoryRectangular,
  # accessoryInline).  Hosted as an extension so the watch face
  # can pull them in to a custom face.
  SplynekWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: iOS/SplynekWatchComplications
        excludes:
          - "Info.plist"
      # Same iOS/Shared inline pattern — the complication needs
      # PairedMacStore / PairedMacClient / RelaySummary at hand.
      - path: iOS/Shared
    info:
      path: iOS/SplynekWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: Splynek Complications
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SplynekWatchComplications
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.companion.watchkitapp.complications
        SKIP_INSTALL: "YES"
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic

  # S4 phase 2 (2026-05-07) — Widget Extension hosting the
  # DownloadActivityWidget Live Activity views.  Activities are
  # started by the host SplynekCompanion app's LiveActivityDriver;
  # WidgetKit renders them via this extension on the lock screen,
  # Dynamic Island, and (passed-through by macOS 26) the Mac menu
  # bar.
  SplynekCompanionWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/SplynekCompanionWidgets
        excludes:
          - "Info.plist"
      # Pull DownloadActivityAttributes in from Shared so the
      # widget extension's ActivityConfiguration knows the type.
      # Other Shared/ files compile fine here too — `os(iOS)`
      # gates exclude any Activity-related types from non-iOS
      # builds.
      - path: iOS/Shared
    info:
      path: iOS/SplynekCompanionWidgets/Info.plist
      properties:
        CFBundleDisplayName: Splynek Activities
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SplynekWidgets
        PRODUCT_BUNDLE_IDENTIFIER: app.splynek.companion.Widgets
        CODE_SIGN_ENTITLEMENTS: iOS/Resources/SplynekCompanionWidgets.entitlements
        SKIP_INSTALL: "YES"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic

schemes:
  Splynek:
    build:
      targets:
        Splynek: all
    run:
      config: Debug
    archive:
      config: Release
  Splynek-MAS:
    build:
      targets:
        Splynek-MAS: all
    run:
      config: Debug
    archive:
      config: Release-MAS
  SplynekCompanion:
    build:
      targets:
        SplynekCompanion: all
        SplynekShareExtension: all
        SplynekCompanionWidgets: all
    run:
      config: Debug
    archive:
      config: Release
  SplynekWatch:
    build:
      targets:
        SplynekWatch: all
        SplynekWatchComplications: all
    run:
      config: Debug
    archive:
      config: Release
